services:
    urjalink-frontend:
        build:
            context: ./ui
            dockerfile: Dockerfile
            args:
                VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
                VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        container_name: urjalink-frontend
        restart: unless-stopped
        ports:
            - "3000:80"